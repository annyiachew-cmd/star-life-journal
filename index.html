<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>追星生活手账</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#f3a8c7">
  <style>
    :root {
      --bg: #f8fbff;
      --paper: rgba(255, 255, 255, 0.88);
      --ink: #202437;
      --muted: #66708d;
      --line: rgba(133, 159, 210, 0.30);
      --accent: #f48fbd;
      --accent-dark: #d7659e;
      --blue: #86b9ff;
      --green: #5d8f93;
      --danger: #c95f78;
      --serenity: #8eb8f2;
      --quartz: #f3a8c7;
      --gold: #d6a85f;
      --shadow: 0 18px 42px rgba(74, 99, 159, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 183, 215, 0.56), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(156, 202, 255, 0.58), transparent 30%),
        linear-gradient(135deg, #fff2fa 0%, #edf7ff 48%, #fff8fd 100%);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.34) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.34) 1px, transparent 1px);
      background-size: 34px 34px;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 9;
      background: rgba(32, 36, 55, 0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      backdrop-filter: blur(2px);
    }

    .side-drawer {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 10;
      width: min(360px, 88vw);
      padding: 22px;
      transform: translateX(-105%);
      transition: transform 220ms ease;
      background:
        radial-gradient(circle at 18% 8%, rgba(255, 183, 215, 0.58), transparent 30%),
        radial-gradient(circle at 88% 18%, rgba(142, 190, 255, 0.48), transparent 34%),
        rgba(255, 255, 255, 0.68);
      border-right: 1px solid rgba(255, 255, 255, 0.74);
      box-shadow: 24px 0 50px rgba(74, 99, 159, 0.22);
      backdrop-filter: blur(22px) saturate(160%);
      overflow-y: auto;
    }

    .drawer-open .drawer-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-open .side-drawer {
      transform: translateX(0);
    }

    .drawer-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .drawer-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .drawer-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .drawer-close {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.60);
      border: 1px solid rgba(133, 159, 210, 0.32);
      color: #344067;
      font-size: 22px;
    }

    .category-grid {
      display: grid;
      gap: 10px;
    }

    .category-tile {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 64px;
      padding: 12px;
      text-align: left;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.72);
      color: #26304f;
      box-shadow: 0 12px 26px rgba(74, 99, 159, 0.10);
      backdrop-filter: blur(14px);
    }

    .category-tile:hover {
      background: rgba(255, 255, 255, 0.76);
    }

    .category-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 175, 211, 0.62), rgba(142, 190, 255, 0.62));
      color: #2d3658;
      font-weight: 700;
    }

    .category-name {
      display: block;
      font-weight: 700;
    }

    .category-hint {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .category-count {
      min-width: 30px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.70);
      color: var(--accent-dark);
      text-align: center;
      font-size: 13px;
      font-weight: 700;
    }

    .topbar {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(115deg, rgba(255, 175, 211, 0.96), rgba(142, 190, 255, 0.96)),
        #f3a8c7;
      color: #1f253c;
      padding: 22px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 14px 32px rgba(80, 102, 164, 0.18);
    }

    .topbar::before {
      content: "17";
      position: absolute;
      right: 36px;
      top: -18px;
      color: rgba(255, 255, 255, 0.40);
      font-size: 112px;
      font-weight: 700;
      letter-spacing: 0;
      pointer-events: none;
    }

    .topbar::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 5px;
      background: linear-gradient(90deg, #ffafd3, #ffffff, #8ebeff, #f7d7e8);
    }

    .topbar-inner {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .topbar-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .brand {
      position: relative;
      display: grid;
      grid-template-columns: 54px 1fr;
      align-items: center;
      column-gap: 14px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      margin-left: 6px;
      transform: rotate(45deg);
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.36);
      color: #2d3658;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(76, 88, 145, 0.14);
      overflow: hidden;
      position: relative;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border: 1px solid rgba(214, 168, 95, 0.76);
      pointer-events: none;
    }

    .brand-mark span,
    .brand-mark img {
      transform: rotate(-45deg);
    }

    .brand-mark img {
      width: 76px;
      height: 76px;
      object-fit: cover;
      display: none;
    }

    .brand-mark.has-image span {
      display: none;
    }

    .brand-mark.has-image img {
      display: block;
    }

    .brand h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand span {
      color: rgba(31, 37, 60, 0.74);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(84px, 1fr));
      gap: 10px;
      min-width: 310px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.56);
      border-radius: 8px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: rgba(31, 37, 60, 0.66);
      font-size: 12px;
    }

    .layout {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 22px;
      align-items: start;
    }

    .showcase-hero {
      position: relative;
      overflow: hidden;
      max-width: 1180px;
      margin: 24px auto 0;
      padding: 22px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.28)),
        rgba(255, 255, 255, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(160%);
    }

    .showcase-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 8% 25%, var(--hero-glow, rgba(255, 175, 211, 0.36)), transparent 25%),
        radial-gradient(circle at 92% 12%, var(--hero-glow-2, rgba(142, 190, 255, 0.42)), transparent 30%);
      pointer-events: none;
    }

    .showcase-copy,
    .showcase-mark {
      position: relative;
      z-index: 1;
    }

    .showcase-copy span {
      display: inline-block;
      margin-bottom: 7px;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .showcase-copy h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
    }

    .showcase-copy p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .showcase-mark {
      width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      transform: rotate(45deg);
      border: 2px solid rgba(255, 255, 255, 0.88);
      background: linear-gradient(135deg, rgba(255, 175, 211, 0.56), rgba(142, 190, 255, 0.58));
      color: #2d3658;
      font-size: 32px;
      font-weight: 700;
      box-shadow: 0 16px 34px rgba(74, 99, 159, 0.18);
    }

    .showcase-mark span {
      transform: rotate(-45deg);
    }

    .panel {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.36)),
        rgba(255, 255, 255, 0.44);
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(155%);
    }

    .editor {
      position: sticky;
      top: 18px;
      padding: 18px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.3;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 12px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid rgba(133, 159, 210, 0.38);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(243, 168, 199, 0.28);
    }

    .field textarea {
      min-height: 142px;
      resize: vertical;
      line-height: 1.6;
    }

    .image-tools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .image-preview {
      display: none;
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid rgba(133, 159, 210, 0.30);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.54);
    }

    .image-preview img {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 14px;
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn,
    .small-btn {
      border-radius: 6px;
      min-height: 40px;
      padding: 9px 13px;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), var(--serenity));
      color: white;
      box-shadow: 0 10px 20px rgba(232, 138, 180, 0.28);
    }

    .primary-btn:hover {
      background: linear-gradient(135deg, var(--accent-dark), #6b97dd);
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.74);
      color: #344067;
      border: 1px solid rgba(133, 159, 210, 0.34);
    }

    .danger-btn {
      background: var(--danger);
      color: white;
    }

    .small-btn {
      background: rgba(255, 255, 255, 0.74);
      color: #344067;
      border: 1px solid rgba(133, 159, 210, 0.34);
      min-height: 34px;
      padding: 7px 10px;
      font-size: 14px;
    }

    .toolbar {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 160px 130px auto auto auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .toolbar input,
    .toolbar select {
      width: 100%;
      border: 1px solid rgba(133, 159, 210, 0.38);
      border-radius: 6px;
      padding: 10px 11px;
      background: rgba(255, 255, 255, 0.88);
    }

    .entries {
      display: grid;
      gap: 12px;
    }

    .entry {
      background:
        radial-gradient(circle at 18% 6%, var(--entry-glow, rgba(255, 175, 211, 0.28)), transparent 32%),
        radial-gradient(circle at 92% 18%, var(--entry-glow-2, rgba(142, 190, 255, 0.30)), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.80), rgba(255, 248, 253, 0.58)),
        var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px) saturate(150%);
    }

    .entry::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: linear-gradient(180deg, var(--quartz), var(--serenity));
    }

    .entry::after {
      content: "17";
      position: absolute;
      right: 18px;
      bottom: 6px;
      color: rgba(142, 184, 242, 0.13);
      font-size: 64px;
      font-weight: 700;
      pointer-events: none;
    }

    .entry-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .entry h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .entry-meta {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      border-radius: 999px;
      padding: 4px 9px;
      background: rgba(255, 255, 255, 0.78);
      color: #4e5a84;
      border: 1px solid rgba(133, 159, 210, 0.26);
    }

    .badge.video {
      background: rgba(142, 184, 242, 0.20);
      color: var(--blue);
    }

    .badge.diary {
      background: rgba(243, 168, 199, 0.24);
      color: var(--accent);
    }

    .badge.journal {
      background: rgba(214, 168, 95, 0.18);
      color: var(--green);
    }

    .content {
      margin: 12px 0 0;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .entry-image {
      display: block;
      width: 100%;
      max-height: min(560px, 78vh);
      object-fit: contain;
      object-position: top center;
      background:
        radial-gradient(circle at 20% 10%, var(--entry-glow, rgba(255, 175, 211, 0.36)), transparent 38%),
        radial-gradient(circle at 82% 20%, var(--entry-glow-2, rgba(142, 190, 255, 0.36)), transparent 40%),
        rgba(255, 255, 255, 0.36);
    }

    .entry-image-frame {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      background:
        radial-gradient(circle at 10% 8%, var(--entry-glow, rgba(255, 175, 211, 0.35)), transparent 36%),
        radial-gradient(circle at 90% 12%, var(--entry-glow-2, rgba(142, 190, 255, 0.35)), transparent 38%),
        rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(18px) saturate(150%);
    }

    .entry-image-frame img {
      border-radius: 8px;
      border: 1px solid rgba(133, 159, 210, 0.28);
    }

    .entry-link {
      display: inline-block;
      margin-top: 10px;
      color: var(--accent-dark);
      text-decoration: none;
      border-bottom: 1px solid rgba(185, 95, 139, 0.35);
    }

    .entry-link:hover {
      border-bottom-color: var(--accent-dark);
    }

    .entry-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .empty {
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.56);
      border: 1px dashed rgba(133, 159, 210, 0.48);
      border-radius: 8px;
    }

    .display-mode .editor,
    .display-mode .toolbar,
    .display-mode .entry-actions {
      display: none;
    }

    .display-mode .layout {
      grid-template-columns: 1fr;
      max-width: 1040px;
    }

    .display-mode .entries {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .display-mode .entry {
      min-height: 280px;
    }

    .display-mode .entry h2 {
      font-size: 22px;
    }

    @media (max-width: 860px) {
      .topbar-inner {
        align-items: stretch;
        flex-direction: column;
      }

      .stats {
        min-width: 0;
      }

      .layout {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .editor {
        position: static;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .showcase-hero,
      .display-mode .entries {
        grid-template-columns: 1fr;
      }

      .showcase-mark {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        padding: 16px;
      }

      .brand h1 {
        font-size: 21px;
      }

      .stats,
      .two-col,
      .actions,
      .image-tools {
        grid-template-columns: 1fr;
      }

      .entry-head {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="drawer-backdrop" onclick="closeDrawer()"></div>
  <aside class="side-drawer" aria-label="分类菜单">
    <div class="drawer-head">
      <div>
        <h2>分类菜单</h2>
        <p>点一个分类，只看这一类记录。</p>
      </div>
      <button class="drawer-close" onclick="closeDrawer()" aria-label="关闭菜单">×</button>
    </div>

    <div class="category-grid" id="categoryMenu"></div>
  </aside>

  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <button class="brand-mark" id="brandMark" onclick="openDrawer()" aria-label="打开分类菜单">
            <span>17</span>
            <img id="brandMarkImg" alt="自定义标志图片">
          </button>
          <div class="brand-text">
            <h1>追星生活手账</h1>
            <span>日记、舞台、视频、repo 和灵感都放在这里</span>
          </div>
        </div>

        <div class="stats">
          <div class="stat">
            <strong id="totalCount">0</strong>
            <span>全部记录</span>
          </div>
          <div class="stat">
            <strong id="videoCount">0</strong>
            <span>视频相关</span>
          </div>
          <div class="stat">
            <strong id="favoriteCount">0</strong>
            <span>已收藏</span>
          </div>
        </div>
      </div>
      <div class="topbar-inner topbar-actions">
        <button class="secondary-btn" id="displayModeBtn" onclick="toggleDisplayMode()">进入展示模式</button>
      </div>
    </header>

    <section class="showcase-hero">
      <div class="showcase-copy">
        <span id="quoteSource">SEVENTEEN</span>
        <h2 id="quoteText">把今天的心动做成一页粉蓝手账</h2>
        <p id="quoteSubtext">适合记录舞台、视频、截图、repo 和一点点只属于你的心情。</p>
      </div>
      <div class="showcase-mark"><span>17</span></div>
    </section>

    <main class="layout">
      <section class="panel editor">
        <h2 class="section-title" id="formTitle">新增记录</h2>

        <div class="field">
          <label for="title">标题</label>
          <input id="title" placeholder="比如：今晚的舞台太漂亮了">
        </div>

        <div class="two-col">
          <div class="field">
            <label for="date">日期</label>
            <input id="date" type="date">
          </div>

          <div class="field">
            <label for="category">分类</label>
            <select id="category">
              <option>日记</option>
              <option>视频</option>
              <option>手账</option>
              <option>舞台</option>
              <option>物料</option>
              <option>repo</option>
            </select>
          </div>
        </div>

        <div class="two-col">
          <div class="field">
            <label for="idol">相关人物/组合</label>
            <input id="idol" placeholder="可不填">
          </div>

          <div class="field">
            <label for="mood">心情</label>
            <select id="mood">
              <option>开心</option>
              <option>感动</option>
              <option>震撼</option>
              <option>想念</option>
              <option>平静</option>
              <option>其他</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="link">视频/图片/帖子链接</label>
          <input id="link" placeholder="可不填，比如 B站、微博、YouTube 链接">
        </div>

        <div class="field">
          <label for="brandImageFile">顶部标志图片</label>
          <div class="image-tools">
            <input id="brandImageFile" type="file" accept="image/*" onchange="handleBrandImageUpload(event)">
            <button class="secondary-btn" type="button" onclick="removeBrandImage()">恢复 17</button>
          </div>
        </div>

        <div class="field">
          <label for="imageFile">上传图片</label>
          <div class="image-tools">
            <input id="imageFile" type="file" accept="image/*" onchange="handleImageUpload(event)">
            <button class="secondary-btn" type="button" onclick="removeImage()">移除图片</button>
          </div>
          <div class="image-preview" id="imagePreview">
            <img id="imagePreviewImg" alt="图片预览">
          </div>
        </div>

        <div class="field">
          <label for="tags">标签</label>
          <input id="tags" placeholder="用逗号分开，比如 舞台, 直拍, 生日">
        </div>

        <div class="field">
          <label for="content">正文</label>
          <textarea id="content" placeholder="写下今天想留下来的内容"></textarea>
        </div>

        <div class="actions">
          <button class="primary-btn" id="saveBtn" onclick="saveEntry()">保存记录</button>
          <button class="secondary-btn" onclick="resetForm()">清空</button>
        </div>
      </section>

      <section>
        <div class="panel toolbar">
          <input id="search" placeholder="搜索标题、正文、标签、人物或日期" oninput="renderEntries()">
          <select id="filterCategory" onchange="renderEntries()">
            <option value="全部">全部分类</option>
            <option>日记</option>
            <option>视频</option>
            <option>手账</option>
            <option>舞台</option>
            <option>物料</option>
            <option>repo</option>
          </select>
          <select id="filterFavorite" onchange="renderEntries()">
            <option value="全部">全部记录</option>
            <option value="收藏">只看收藏</option>
          </select>
          <button class="secondary-btn backup-control" onclick="exportBackup()">导出备份</button>
          <button class="secondary-btn backup-control" onclick="chooseBackupFile()">导入备份</button>
          <button class="secondary-btn" onclick="toggleDisplayMode()">展示模式</button>
          <input id="backupFile" type="file" accept=".json,application/json" onchange="importBackup(event)" hidden>
        </div>

        <div id="entries" class="entries"></div>
      </section>
    </main>
  </div>

  <script>
    const storageKey = "starLifeJournalEntries";
    const brandImageKey = "starLifeJournalBrandImage";
    const maxUploadSize = 1024 * 1024 * 30;
    let entries = JSON.parse(localStorage.getItem(storageKey) || "[]");
    let editingId = null;
    let currentImageData = "";
    let currentImageTone = null;
    let displayMode = false;

    const quotes = [
      {
        member: "SEVENTEEN",
        text: "把今天的心动做成一页粉蓝手账",
        subtext: "适合记录舞台、视频、截图、repo 和一点点只属于你的心情。"
      },
      {
        member: "SEVENTEEN",
        text: "今天也把喜欢认真收藏起来",
        subtext: "把小片段、小截图、小心情都留在这里。"
      },
      {
        member: "SEVENTEEN",
        text: "这一刻值得被好好记录",
        subtext: "舞台、物料、日记和灵感都可以慢慢整理。"
      },
      {
        member: "SEVENTEEN",
        text: "给喜欢的瞬间留一个漂亮位置",
        subtext: "打开这一页，就像翻到自己的粉蓝手账。"
      },
      {
        member: "SEVENTEEN",
        text: "今天的快乐也和 SEVENTEEN 有关",
        subtext: "把链接、图片和心情放在一起，之后再回来重看。"
      }
    ];

    const categories = [
      { name: "全部", icon: "ALL", hint: "查看所有记录" },
      { name: "日记", icon: "D", hint: "日常心情和碎碎念" },
      { name: "视频", icon: "V", hint: "视频链接和观后感" },
      { name: "手账", icon: "J", hint: "拼贴、截图和灵感" },
      { name: "舞台", icon: "S", hint: "舞台、直拍、现场" },
      { name: "物料", icon: "M", hint: "杂志、照片、官方内容" },
      { name: "repo", icon: "R", hint: "repo 和现场记录" },
      { name: "收藏", icon: "★", hint: "只看收藏记录" }
    ];

    const sampleEntries = [
      {
        id: makeId(),
        title: "示例：收藏一支舞台视频",
        date: getToday(),
        category: "视频",
        idol: "示例组合",
        mood: "开心",
        link: "https://example.com",
        tags: "舞台, 直拍",
        content: "这里可以写你看完视频之后的感受，也可以贴视频链接，之后用搜索找回来。",
        image: "",
        imageTone: null,
        favorite: true
      },
      {
        id: makeId(),
        title: "示例：今天的小日记",
        date: getToday(),
        category: "日记",
        idol: "",
        mood: "平静",
        link: "",
        tags: "日常, 手账",
        content: "这是一个示例记录。你可以编辑它，也可以删除它。",
        image: "",
        imageTone: null,
        favorite: false
      }
    ];

    if (entries.length === 0) {
      entries = sampleEntries;
      saveEntries();
    }

    document.getElementById("date").value = getToday();
    renderRandomQuote();
    renderBrandImage();
    renderCategoryMenu();
    renderEntries();

    function makeId() {
      return String(Date.now()) + String(Math.floor(Math.random() * 100000));
    }

    function getToday() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }

    function saveEntries() {
      localStorage.setItem(storageKey, JSON.stringify(entries));
    }

    function renderRandomQuote() {
      const quote = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById("quoteSource").textContent = quote.member;
      document.getElementById("quoteText").textContent = quote.text;
      document.getElementById("quoteSubtext").textContent = quote.subtext;
    }

    function getFormData() {
      return {
        title: document.getElementById("title").value.trim(),
        date: document.getElementById("date").value,
        category: document.getElementById("category").value,
        idol: document.getElementById("idol").value.trim(),
        mood: document.getElementById("mood").value,
        link: document.getElementById("link").value.trim(),
        tags: document.getElementById("tags").value.trim(),
        content: document.getElementById("content").value.trim(),
        image: currentImageData,
        imageTone: currentImageTone
      };
    }

    function saveEntry() {
      const data = getFormData();

      if (!data.title || !data.content) {
        alert("标题和正文要填一下。");
        return;
      }

      if (editingId) {
        entries = entries.map(function(entry) {
          if (entry.id !== editingId) {
            return entry;
          }

          return Object.assign({}, entry, data);
        });
      } else {
        entries.unshift(Object.assign({}, data, {
          id: makeId(),
          favorite: false
        }));
      }

      saveEntries();
      resetForm();
      renderEntries();
    }

    function resetForm() {
      editingId = null;
      document.getElementById("formTitle").textContent = "新增记录";
      document.getElementById("saveBtn").textContent = "保存记录";
      document.getElementById("title").value = "";
      document.getElementById("date").value = getToday();
      document.getElementById("category").value = "日记";
      document.getElementById("idol").value = "";
      document.getElementById("mood").value = "开心";
      document.getElementById("link").value = "";
      document.getElementById("imageFile").value = "";
      document.getElementById("tags").value = "";
      document.getElementById("content").value = "";
      removeImagePreview();
    }

    function renderEntries() {
      const container = document.getElementById("entries");
      const keyword = document.getElementById("search").value.trim().toLowerCase();
      const category = document.getElementById("filterCategory").value;
      const favoriteFilter = document.getElementById("filterFavorite").value;

      const filtered = entries.filter(function(entry) {
        const text = [
          entry.title,
          entry.date,
          entry.category,
          entry.idol,
          entry.mood,
          entry.link,
          entry.tags,
          entry.content,
          entry.image ? "图片" : ""
        ].join(" ").toLowerCase();

        const matchKeyword = text.includes(keyword);
        const matchCategory = category === "全部" || entry.category === category;
        const matchFavorite = favoriteFilter === "全部" || entry.favorite;

        return matchKeyword && matchCategory && matchFavorite;
      });

      updateStats();
      updateHeroTone();
      renderCategoryMenu();
      container.innerHTML = "";

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "没有找到记录。换个关键词，或者先新增一条。";
        container.appendChild(empty);
        return;
      }

      filtered.forEach(function(entry) {
        container.appendChild(createEntryElement(entry));
      });
    }

    function createEntryElement(entry) {
      const article = document.createElement("article");
      article.className = "entry";

      if (entry.imageTone) {
        article.style.setProperty("--entry-glow", entry.imageTone.primary);
        article.style.setProperty("--entry-glow-2", entry.imageTone.secondary);
      }

      const head = document.createElement("div");
      head.className = "entry-head";

      const titleBox = document.createElement("div");
      const title = document.createElement("h2");
      title.textContent = entry.title;
      titleBox.appendChild(title);

      const meta = document.createElement("div");
      meta.className = "entry-meta";
      addBadge(meta, entry.date || "未选日期");
      addBadge(meta, entry.category, getCategoryClass(entry.category));
      addBadge(meta, entry.mood || "未选心情");

      if (entry.idol) {
        addBadge(meta, entry.idol);
      }

      if (entry.favorite) {
        addBadge(meta, "收藏");
      }

      titleBox.appendChild(meta);
      head.appendChild(titleBox);

      const favoriteBtn = document.createElement("button");
      favoriteBtn.className = "small-btn";
      favoriteBtn.textContent = entry.favorite ? "取消收藏" : "收藏";
      favoriteBtn.onclick = function() {
        toggleFavorite(entry.id);
      };
      head.appendChild(favoriteBtn);

      article.appendChild(head);

      if (entry.tags) {
        const tagMeta = document.createElement("div");
        tagMeta.className = "entry-meta";
        entry.tags.split(",").map(function(tag) {
          return tag.trim();
        }).filter(Boolean).forEach(function(tag) {
          addBadge(tagMeta, "#" + tag);
        });
        article.appendChild(tagMeta);
      }

      if (entry.image) {
        const imageFrame = document.createElement("div");
        imageFrame.className = "entry-image-frame";

        const image = document.createElement("img");
        image.className = "entry-image";
        image.src = entry.image;
        image.alt = entry.title + " 的图片";
        imageFrame.appendChild(image);
        article.appendChild(imageFrame);
      }

      const content = document.createElement("p");
      content.className = "content";
      content.textContent = entry.content;
      article.appendChild(content);

      if (entry.link) {
        const link = document.createElement("a");
        link.className = "entry-link";
        link.href = entry.link;
        link.target = "_blank";
        link.rel = "noreferrer";
        link.textContent = "打开链接";
        article.appendChild(link);
      }

      const actions = document.createElement("div");
      actions.className = "entry-actions";

      const editBtn = document.createElement("button");
      editBtn.className = "small-btn";
      editBtn.textContent = "编辑";
      editBtn.onclick = function() {
        editEntry(entry.id);
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "danger-btn small-btn";
      deleteBtn.textContent = "删除";
      deleteBtn.onclick = function() {
        deleteEntry(entry.id);
      };

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);
      article.appendChild(actions);

      return article;
    }

    function addBadge(container, text, extraClass) {
      const badge = document.createElement("span");
      badge.className = "badge" + (extraClass ? " " + extraClass : "");
      badge.textContent = text;
      container.appendChild(badge);
    }

    function getCategoryClass(category) {
      if (category === "视频" || category === "舞台") {
        return "video";
      }

      if (category === "手账" || category === "repo") {
        return "journal";
      }

      return "diary";
    }

    function editEntry(id) {
      const entry = entries.find(function(item) {
        return item.id === id;
      });

      if (!entry) {
        return;
      }

      editingId = id;
      document.getElementById("formTitle").textContent = "编辑记录";
      document.getElementById("saveBtn").textContent = "保存修改";
      document.getElementById("title").value = entry.title;
      document.getElementById("date").value = entry.date;
      document.getElementById("category").value = entry.category;
      document.getElementById("idol").value = entry.idol || "";
      document.getElementById("mood").value = entry.mood || "开心";
      document.getElementById("link").value = entry.link || "";
      document.getElementById("tags").value = entry.tags || "";
      document.getElementById("content").value = entry.content;
      currentImageData = entry.image || "";
      currentImageTone = entry.imageTone || null;
      showImagePreview(currentImageData);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function handleImageUpload(event) {
      const file = event.target.files[0];

      if (!file) {
        return;
      }

      if (!file.type.startsWith("image/")) {
        alert("请选择图片文件。");
        event.target.value = "";
        return;
      }

      if (file.size > maxUploadSize) {
        alert("图片太大了。现在最多选择 30MB 以内的图片。");
        event.target.value = "";
        return;
      }

      compressImageFile(file, 1800, 0.86).then(function(imageData) {
        currentImageData = imageData;
        showImagePreview(currentImageData);
        return extractImageTone(currentImageData).then(function(tone) {
          currentImageTone = tone;
        });
      }).catch(function() {
        alert("图片处理失败，换一张试试。");
        event.target.value = "";
      });
    }

    function handleBrandImageUpload(event) {
      const file = event.target.files[0];

      if (!file) {
        return;
      }

      if (!file.type.startsWith("image/")) {
        alert("请选择图片文件。");
        event.target.value = "";
        return;
      }

      if (file.size > maxUploadSize) {
        alert("图片太大了。现在最多选择 30MB 以内的图片。");
        event.target.value = "";
        return;
      }

      compressImageFile(file, 500, 0.88).then(function(imageData) {
        localStorage.setItem(brandImageKey, imageData);
        renderBrandImage();
      }).catch(function() {
        alert("图片处理失败，换一张试试。");
        event.target.value = "";
      });
    }

    function renderBrandImage() {
      const imageData = localStorage.getItem(brandImageKey);
      const mark = document.getElementById("brandMark");
      const image = document.getElementById("brandMarkImg");

      if (!mark || !image) {
        return;
      }

      if (!imageData) {
        mark.classList.remove("has-image");
        image.removeAttribute("src");
        return;
      }

      image.src = imageData;
      mark.classList.add("has-image");
    }

    function removeBrandImage() {
      localStorage.removeItem(brandImageKey);
      document.getElementById("brandImageFile").value = "";
      renderBrandImage();
    }

    function compressImageFile(file, maxSize, quality) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();

        reader.onload = function() {
          const image = new Image();

          image.onload = function() {
            const ratio = Math.min(1, maxSize / Math.max(image.width, image.height));
            const width = Math.max(1, Math.round(image.width * ratio));
            const height = Math.max(1, Math.round(image.height * ratio));
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;

            const context = canvas.getContext("2d");
            context.drawImage(image, 0, 0, width, height);

            const type = file.type === "image/png" && file.size < 1024 * 1024 ? "image/png" : "image/jpeg";
            resolve(canvas.toDataURL(type, quality));
          };

          image.onerror = reject;
          image.src = reader.result;
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function showImagePreview(imageData) {
      const preview = document.getElementById("imagePreview");
      const image = document.getElementById("imagePreviewImg");

      if (!imageData) {
        removeImagePreview();
        return;
      }

      image.src = imageData;
      preview.style.display = "block";
    }

    function removeImage() {
      document.getElementById("imageFile").value = "";
      removeImagePreview();
    }

    function removeImagePreview() {
      currentImageData = "";
      currentImageTone = null;
      document.getElementById("imagePreviewImg").removeAttribute("src");
      document.getElementById("imagePreview").style.display = "none";

    function deleteEntry(id) {
      const sure = confirm("确定要删除这条记录吗？");

      if (!sure) {
        return;

      entries = entries.filter(function(entry) {
        return entry.id !== id;

      saveEntries();
      renderEntries();

      if (editingId === id) {
        resetForm();
      }

    function toggleFavorite(id) {
      entries = entries.map(function(entry) {
        if (entry.id !== id) {
          return entry;
        }

        return Object.assign({}, entry, {
          favorite: !entry.favorite
        });
      });

      saveEntries();
      renderEntries();
    }

    function toggleDisplayMode() {
      displayMode = !displayMode;
      document.body.classList.toggle("display-mode", displayMode);
      document.getElementById("displayModeBtn").textContent = displayMode ? "退出展示模式" : "进入展示模式";
    }

    function openDrawer() {
      document.body.classList.add("drawer-open");
    }

    function closeDrawer() {
      document.body.classList.remove("drawer-open");
    }

    function selectCategory(category) {
      if (category === "收藏") {
        document.getElementById("filterCategory").value = "全部";
        document.getElementById("filterFavorite").value = "收藏";
      } else {
        document.getElementById("filterCategory").value = category;
        document.getElementById("filterFavorite").value = "全部";
      }

      closeDrawer();
      renderEntries();
    }

    function renderCategoryMenu() {
      const container = document.getElementById("categoryMenu");

      if (!container) {
        return;
      }

      container.innerHTML = "";

      categories.forEach(function(category) {
        const button = document.createElement("button");
        button.className = "category-tile";
        button.onclick = function() {
          selectCategory(category.name);
        };

        const icon = document.createElement("span");
        icon.className = "category-icon";
        icon.textContent = category.icon;

        const text = document.createElement("span");
        const name = document.createElement("span");
        name.className = "category-name";
        name.textContent = category.name;
        const hint = document.createElement("span");
        hint.className = "category-hint";
        hint.textContent = category.hint;
        text.appendChild(name);
        text.appendChild(hint);

        const count = document.createElement("span");
        count.className = "category-count";
        count.textContent = getCategoryCount(category.name);

        button.appendChild(icon);
        button.appendChild(text);
        button.appendChild(count);
        container.appendChild(button);
      });
    }

    function getCategoryCount(category) {
      if (category === "全部") {
        return entries.length;
      }

      if (category === "收藏") {
        return entries.filter(function(entry) {
          return entry.favorite;
        }).length;
      }

      return entries.filter(function(entry) {
        return entry.category === category;
      }).length;
    }

    function extractImageTone(imageData) {
      return new Promise(function(resolve) {
        const image = new Image();

        image.onload = function() {
          const canvas = document.createElement("canvas");
          const size = 32;
          canvas.width = size;
          canvas.height = size;

          const context = canvas.getContext("2d");
          context.drawImage(image, 0, 0, size, size);

          const pixels = context.getImageData(0, 0, size, size).data;
          let left = { r: 0, g: 0, b: 0, count: 0 };
          let right = { r: 0, g: 0, b: 0, count: 0 };

          for (let y = 0; y < size; y += 1) {
            for (let x = 0; x < size; x += 1) {
              if (x > 4 && x < size - 5 && y > 4 && y < size - 5) {
                continue;
              }

              const index = (y * size + x) * 4;
              const bucket = x < size / 2 ? left : right;
              bucket.r += pixels[index];
              bucket.g += pixels[index + 1];
              bucket.b += pixels[index + 2];
              bucket.count += 1;
            }
          }

          resolve({
            primary: toGlowColor(left),
            secondary: toGlowColor(right)
          });
        };

        image.onerror = function() {
          resolve(null);
        };

        image.src = imageData;
      });
    }

    function toGlowColor(color) {
      if (!color || !color.count) {
        return "rgba(255, 175, 211, 0.30)";
      }

      const r = Math.round(color.r / color.count);
      const g = Math.round(color.g / color.count);
      const b = Math.round(color.b / color.count);
      return "rgba(" + r + ", " + g + ", " + b + ", 0.32)";
    }

    function exportBackup() {
      const data = {
        app: "star-life-journal",
        version: 1,
        exportedAt: new Date().toISOString(),
        entries: entries
      };
      const text = JSON.stringify(data, null, 2);
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "star-journal-backup-" + getToday() + ".json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function chooseBackupFile() {
      document.getElementById("backupFile").click();
    }

    function importBackup(event) {
      const file = event.target.files[0];

      if (!file) {
        return;
      }

      const reader = new FileReader();

      reader.onload = function() {
        try {
          const data = JSON.parse(reader.result);
          const importedEntries = Array.isArray(data) ? data : data.entries;

          if (!Array.isArray(importedEntries)) {
            alert("这个文件不像是追星手账的备份文件。");
            return;
          }

          const sure = confirm("导入会替换当前所有记录。确定继续吗？");

          if (!sure) {
            return;
          }

          entries = importedEntries;
          saveEntries();
          resetForm();
          renderEntries();
          alert("导入成功。");
        } catch (error) {
          alert("导入失败，文件内容可能不正确。");
        } finally {
          event.target.value = "";
        }
      };

      reader.readAsText(file);
    }

    function updateStats() {
      document.getElementById("totalCount").textContent = entries.length;
      document.getElementById("videoCount").textContent = entries.filter(function(entry) {
        return entry.category === "视频" || entry.category === "舞台";
      }).length;
      document.getElementById("favoriteCount").textContent = entries.filter(function(entry) {
        return entry.favorite;
      }).length;
    }

    function updateHeroTone() {
      const entryWithTone = entries.find(function(entry) {
        return entry.imageTone;
      });

      if (!entryWithTone) {
        document.documentElement.style.removeProperty("--hero-glow");
        document.documentElement.style.removeProperty("--hero-glow-2");
        return;
      }

      document.documentElement.style.setProperty("--hero-glow", entryWithTone.imageTone.primary);
      document.documentElement.style.setProperty("--hero-glow-2", entryWithTone.imageTone.secondary);
    }
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("sw.js");
      });
    }
  </script>
</body>
</html>
